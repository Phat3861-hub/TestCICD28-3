name: Deploy Test CICD

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.PHAT3861_RUN_LOGIN }}
          password: ${{ secrets.PHAT3861_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tên image đồng bộ với docker-compose và kịch bản test
          tags: phat3861/testcicd:latest
