name: Deploy Test AcneCare (Nginx Static)

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.PHAT3861_RUN_LOGIN }}
          password: ${{ secrets.PHAT3861_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tên image đồng bộ với docker-compose và kịch bản test
          tags: phat3861/testcicd:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="phat3861/testcicd"
          # Nginx chạy port 80, nên để 80 để server mapping đúng
          CONTAINER_PORT=80
          
          # Gọi Webhook để server kéo image mới về Slot 8
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=8&container_port=$CONTAINER_PORT&strict_container_port=0")
          
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP Status Code: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Kiểm tra log chi tiết bên dưới."
            echo "::group::Chi tiết phản hồi từ Server (JSON)"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "Deploy thành công rực rỡ!"
          echo "::group::Chi tiết phản hồi từ Server (JSON)"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
